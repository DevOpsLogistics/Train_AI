# Fine-tune PhoBERT phân loại quan hệ (entity pair marking)

dataset:
  raw_dir: ./data/training/benh_an_relation
  relation_types:
    - TREATS
    - DOSAGE_OF
    - ASSOCIATED_WITH
    - INDICATES

model:
  base: vinai/phobert-base
  max_length: 256

training:
  output_dir: ./models/benh_an_relation
  num_epochs: 10
  batch_size: 16
  eval_batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  seed: 42
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: f1

inference:
  model_path: ./models/benh_an_relation/final
